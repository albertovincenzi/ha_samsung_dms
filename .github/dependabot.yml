version: 2
updates:
  # Keep GitHub Actions pinned SHAs current (OpenSSF Dependency-Update-Tool).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Keep Python test dependencies current.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
