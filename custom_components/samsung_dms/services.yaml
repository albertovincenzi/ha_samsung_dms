set_use_limit:
  name: Set guest use-limit
  description: >-
    Restrict the temperature range a guest's wall remote may set on the target
    indoor unit(s). Cool fields bound cooling mode, heat fields bound heating
    mode. Omitted fields are left unchanged. Applied via a whole-form round-trip
    to the DMS, so other units are never affected.
  target:
    entity:
      integration: samsung_dms
      domain: climate
  fields:
    cool_min:
      name: Cool min
      description: Lowest cooling setpoint a guest may set.
      selector:
        number:
          min: 16
          max: 30
          step: 1
          unit_of_measurement: "°C"
    cool_max:
      name: Cool max
      description: Highest cooling setpoint a guest may set.
      selector:
        number:
          min: 16
          max: 30
          step: 1
          unit_of_measurement: "°C"
    heat_min:
      name: Heat min
      description: Lowest heating setpoint a guest may set.
      selector:
        number:
          min: 16
          max: 30
          step: 1
          unit_of_measurement: "°C"
    heat_max:
      name: Heat max
      description: Highest heating setpoint a guest may set.
      selector:
        number:
          min: 16
          max: 30
          step: 1
          unit_of_measurement: "°C"
